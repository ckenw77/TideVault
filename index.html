<script>
  const PAGE_SIZE = 25;
  const INITIAL_WORLD_ZOOM = 1;
  const MAP_MAX_ZOOM = 10;

  let map;
  let highFrequencyLayer;
  let lowFrequencyLayer;
  let undigitisedLayer;

  const datasets = {
    High_Frequency: {
      key: "High_Frequency",
      file: "Digitised_Records_High_Frequency_2026_05_06.xlsx",
      sheet: "Sheet1",
      containerId: "High_Frequency-table",
      tableId: "High_Frequency-live-table",
      metaId: "High_Frequency-meta",
      emptyId: "High_Frequency-empty",
      pageInfoId: "High_Frequency-page-info",
      filters: {
        search: "High_Frequency-search",
        country: "High_Frequency-country",
        type: "High_Frequency-type",
        method: "High_Frequency-method",
        start: "High_Frequency-start",
        finish: "High_Frequency-finish"
      },
      selectColumns: {
        country: "Country",
        type: "Data Type",
        method: "Method"
      },
      yearColumns: {
        start: "Record start",
        finish: "Record finish"
      },
      mapColumns: {
        lat: "Latitude",
        lng: "Longitude",
        location: "Location",
        country: "Country",
        start: "Record start",
        finish: "Record finish",
        type: "Data Type"
      },
      label: "High frequency digitised",
      colour: "#2ecc71",
      shape: "circle",
      sort: { column: null, direction: "asc" },
      page: 1,
      rows: [],
      filteredRows: [],
      headers: [],
      loaded: false,
      eventsBound: false
    },

    Low_Frequency: {
      key: "Low_Frequency",
      file: "Digitised_Records_Low_Frequency_2026_05_06.xlsx",
      sheet: "Sheet1",
      containerId: "Low_Frequency-table",
      tableId: "Low_Frequency-live-table",
      metaId: "Low_Frequency-meta",
      emptyId: "Low_Frequency-empty",
      pageInfoId: "Low_Frequency-page-info",
      filters: {
        search: "Low_Frequency-search",
        country: "Low_Frequency-country",
        type: "Low_Frequency-type",
        start: "Low_Frequency-start",
        finish: "Low_Frequency-finish"
      },
      selectColumns: {
        country: "Country",
        type: "Data Type"
      },
      yearColumns: {
        start: "Record start",
        finish: "Record finish"
      },
      mapColumns: {
        lat: "Latitude",
        lng: "Longitude",
        location: "Location",
        country: "Country",
        start: "Record start",
        finish: "Record finish",
        type: "Data Type"
      },
      label: "Low frequency digitised",
      colour: "#1f8db3",
      shape: "circle",
      sort: { column: null, direction: "asc" },
      page: 1,
      rows: [],
      filteredRows: [],
      headers: [],
      loaded: false,
      eventsBound: false
    },

    undigitised: {
      key: "undigitised",
      file: "Undigitized_Records_2026_05_05.xlsx",
      sheet: "Sheet1",
      containerId: "undigitised-table",
      tableId: "undigitised-live-table",
      metaId: "undigitised-meta",
      emptyId: "undigitised-empty",
      pageInfoId: "undigitised-page-info",
      filters: {
        search: "undigitised-search",
        country: "undigitised-country",
        type: "undigitised-type",
        start: "undigitised-start",
        finish: "undigitised-finish"
      },
      selectColumns: {
        country: "Country",
        type: "Data Type"
      },
      yearColumns: {
        start: "Start",
        finish: "Finish"
      },
      mapColumns: {
        lat: "Latitude",
        lng: "Longitude",
        location: "Rough location",
        country: "Country",
        start: "Start",
        finish: "Finish",
        type: "Data Type"
      },
      label: "Undigitized",
      colour: "#e67e22",
      shape: "square",
      sort: { column: null, direction: "asc" },
      page: 1,
      rows: [],
      filteredRows: [],
      headers: [],
      loaded: false,
      eventsBound: false
    },

    tools: {
      key: "tools",
      file: "Software_List.xlsx",
      sheet: "Sheet1",
      containerId: "tools-table",
      tableId: "tools-live-table",
      metaId: "tools-meta",
      emptyId: "tools-empty",
      pageInfoId: "tools-page-info",
      filters: { search: "tools-search" },
      selectColumns: {},
      yearColumns: {},
      mapColumns: {},
      label: "Tools",
      sort: { column: null, direction: "asc" },
      page: 1,
      rows: [],
      filteredRows: [],
      headers: [],
      loaded: false,
      eventsBound: false
    }
  };

  function cleanHeaders(headers) {
    return headers
      .filter(header => header !== null && header !== undefined && String(header).trim() !== "")
      .map(header => String(header).trim());
  }

  function normalizeValue(value) {
    if (value && typeof value === "object") {
      if (value.text !== undefined && value.text !== null) return String(value.text).trim();
      return "";
    }
    return value === null || value === undefined ? "" : String(value).trim();
  }

  function normalizeForSearch(value) {
    return normalizeValue(value).toLowerCase();
  }

  function getUniqueValues(rows, columnName) {
    return [...new Set(rows.map(row => normalizeValue(row[columnName])).filter(Boolean))]
      .sort((a, b) => a.localeCompare(b));
  }

  function populateSelect(selectId, values, placeholder) {
    const select = document.getElementById(selectId);
    if (!select) return;

    select.innerHTML = "";

    const firstOption = document.createElement("option");
    firstOption.value = "";
    firstOption.textContent = placeholder;
    select.appendChild(firstOption);

    values.forEach(value => {
      const option = document.createElement("option");
      option.value = value;
      option.textContent = value;
      select.appendChild(option);
    });
  }

  function formatPopupValue(value, fallback = "Not provided") {
    const text = normalizeValue(value);
    return text || fallback;
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function parseCoordinate(value) {
    const text = normalizeValue(value).replace(",", ".").replace(/[^\d.\-]/g, "");
    return parseFloat(text);
  }

  function isValidCoordinate(lat, lng) {
    return Number.isFinite(lat) &&
      Number.isFinite(lng) &&
      lat >= -90 && lat <= 90 &&
      lng >= -180 && lng <= 180;
  }

  function createSquareIcon(colour = "#e67e22") {
    return L.divIcon({
      className: "",
      html: `
        <div style="
          width: 14px;
          height: 14px;
          background: ${colour};
          border: 2px solid white;
          box-shadow: 0 0 0 1px rgba(0,0,0,0.25);
        "></div>
      `,
      iconSize: [14, 14],
      iconAnchor: [7, 7],
      popupAnchor: [0, -8]
    });
  }

  function worksheetToRowsWithLinks(worksheet) {
    const ref = worksheet["!ref"];
    if (!ref) return { headers: [], rows: [] };

    const range = XLSX.utils.decode_range(ref);
    const headers = [];
    const rows = [];

    for (let c = range.s.c; c <= range.e.c; c++) {
      const cellAddress = XLSX.utils.encode_cell({ r: range.s.r, c });
      const cell = worksheet[cellAddress];
      headers.push(cell && cell.v !== undefined ? String(cell.v).trim() : "");
    }

    for (let r = range.s.r + 1; r <= range.e.r; r++) {
      const row = {};
      let hasData = false;

      for (let c = range.s.c; c <= range.e.c; c++) {
        const header = headers[c - range.s.c];
        if (!header) continue;

        const cellAddress = XLSX.utils.encode_cell({ r, c });
        const cell = worksheet[cellAddress];

        if (!cell) {
          row[header] = "";
          continue;
        }

        const value = cell.v !== undefined ? cell.v : "";

        if (cell.l && cell.l.Target) {
          row[header] = {
            text: value === undefined || value === null || value === "" ? cell.l.Target : String(value),
            url: cell.l.Target
          };
        } else {
          row[header] = value;
        }

        if (normalizeValue(row[header]) !== "") hasData = true;
      }

      if (hasData) rows.push(row);
    }

    return { headers, rows };
  }

  function getRowLink(row) {
    const possibleLinkColumns = ["Link", "link", "URL", "Url", "Study Link"];
    let link = "";

    for (const col of possibleLinkColumns) {
      const raw = row[col];

      if (raw && typeof raw === "object" && raw.url) {
        link = raw.url;
        break;
      }

      const rawText = normalizeValue(raw);
      if (/^https?:\/\//i.test(rawText)) {
        link = rawText;
        break;
      }
    }

    return link;
  }

  function buildPopupContent(row, datasetKey) {
    const dataset = datasets[datasetKey];
    const mapCols = dataset.mapColumns;

    const location = formatPopupValue(row[mapCols.location]);
    const country = formatPopupValue(row[mapCols.country]);
    const start = formatPopupValue(row[mapCols.start]);
    const finish = formatPopupValue(row[mapCols.finish]);
    const type = formatPopupValue(row[mapCols.type]);

    const link = getRowLink(row);

    const linkHtml = link
      ? `, <a href="${escapeHtml(link)}" target="_blank" rel="noopener noreferrer">Link</a>`
      : "";

    return `
      <div>
        <strong>${escapeHtml(location)}</strong><br>
        <strong>Dataset:</strong> ${escapeHtml(dataset.label)}<br>
        <strong>Country:</strong> ${escapeHtml(country)}<br>
        <strong>Data type:</strong> ${escapeHtml(type)}<br>
        <strong>Years:</strong> ${escapeHtml(start)}–${escapeHtml(finish)}${linkHtml}
      </div>
    `;
  }

  function initialiseMap() {
    map = L.map("map-frame", {
      worldCopyJump: true,
      minZoom: INITIAL_WORLD_ZOOM,
      maxZoom: MAP_MAX_ZOOM,
      zoomSnap: 1
    }).setView([20, 0], INITIAL_WORLD_ZOOM);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: MAP_MAX_ZOOM,
      minZoom: INITIAL_WORLD_ZOOM,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    map.createPane("lowPane");
    map.createPane("undigitisedPane");
    map.createPane("highPane");

    map.getPane("lowPane").style.zIndex = 400;
    map.getPane("undigitisedPane").style.zIndex = 500;
    map.getPane("highPane").style.zIndex = 600;

    lowFrequencyLayer = L.layerGroup().addTo(map);
    undigitisedLayer = L.layerGroup().addTo(map);
    highFrequencyLayer = L.layerGroup().addTo(map);

    const layerFilter = document.getElementById("map-layer-filter");
    if (layerFilter) layerFilter.addEventListener("change", updateMapVisibility);
  }

  function addMapMarker(row, datasetKey, layer) {
    const dataset = datasets[datasetKey];
    const mapCols = dataset.mapColumns;

    const lat = parseCoordinate(row[mapCols.lat]);
    const lng = parseCoordinate(row[mapCols.lng]);

    if (!isValidCoordinate(lat, lng)) {
      console.warn("Invalid coordinates:", datasetKey, row[mapCols.lat], row[mapCols.lng], row);
      return;
    }

    let pane = "highPane";
    if (datasetKey === "Low_Frequency") pane = "lowPane";
    if (datasetKey === "undigitised") pane = "undigitisedPane";

    let marker;

    if (dataset.shape === "square") {
      marker = L.marker([lat, lng], {
        icon: createSquareIcon(dataset.colour),
        pane: pane
      });
    } else {
      marker = L.circleMarker([lat, lng], {
        radius: 6,
        color: "#ffffff",
        weight: 1.5,
        fillColor: dataset.colour,
        fillOpacity: 0.9,
        pane: pane
      });
    }

    marker.bindPopup(buildPopupContent(row, datasetKey));
    marker.addTo(layer);
  }

  function rebuildMapLayers() {
    if (!map || !highFrequencyLayer || !lowFrequencyLayer || !undigitisedLayer) return;

    highFrequencyLayer.clearLayers();
    lowFrequencyLayer.clearLayers();
    undigitisedLayer.clearLayers();

    datasets.Low_Frequency.rows.forEach(row => addMapMarker(row, "Low_Frequency", lowFrequencyLayer));
    datasets.undigitised.rows.forEach(row => addMapMarker(row, "undigitised", undigitisedLayer));
    datasets.High_Frequency.rows.forEach(row => addMapMarker(row, "High_Frequency", highFrequencyLayer));

    updateMapVisibility();
    map.setView([20, 0], INITIAL_WORLD_ZOOM);
  }

  function updateMapVisibility() {
    if (!map) return;

    const filter = document.getElementById("map-layer-filter");
    const mode = filter ? filter.value : "all";

    const showHigh = mode === "all" || mode === "High_Frequency";
    const showLow = mode === "all" || mode === "Low_Frequency";
    const showUndigitised = mode === "all" || mode === "undigitised";

    if (showLow) {
      if (!map.hasLayer(lowFrequencyLayer)) lowFrequencyLayer.addTo(map);
    } else if (map.hasLayer(lowFrequencyLayer)) {
      map.removeLayer(lowFrequencyLayer);
    }

    if (showUndigitised) {
      if (!map.hasLayer(undigitisedLayer)) undigitisedLayer.addTo(map);
    } else if (map.hasLayer(undigitisedLayer)) {
      map.removeLayer(undigitisedLayer);
    }

    if (showHigh) {
      if (!map.hasLayer(highFrequencyLayer)) highFrequencyLayer.addTo(map);
    } else if (map.hasLayer(highFrequencyLayer)) {
      map.removeLayer(highFrequencyLayer);
    }
  }

  async function loadDataset(datasetKey) {
    const dataset = datasets[datasetKey];
    const meta = document.getElementById(dataset.metaId);

    try {
      const response = await fetch(dataset.file);
      if (!response.ok) throw new Error(`Could not load ${dataset.file}`);

      const arrayBuffer = await response.arrayBuffer();
      const workbook = XLSX.read(arrayBuffer, {
        type: "array",
        cellStyles: true,
        cellFormula: true,
        cellHTML: false
      });

      const worksheet = workbook.Sheets[dataset.sheet] || workbook.Sheets[workbook.SheetNames[0]];
      const parsed = worksheetToRowsWithLinks(worksheet);

      const headers = cleanHeaders(parsed.headers);
      const rows = parsed.rows.filter(row =>
        Object.values(row).some(value => normalizeValue(value) !== "")
      );

      dataset.headers = headers;
      dataset.rows = rows;
      dataset.filteredRows = [...rows];
      dataset.loaded = true;

      Object.entries(dataset.selectColumns || {}).forEach(([filterName, columnName]) => {
        const filterId = dataset.filters[filterName];
        const labelMap = {
          country: "All countries",
          type: "All data types",
          method: "All methods"
        };

        populateSelect(
          filterId,
          getUniqueValues(rows, columnName),
          labelMap[filterName] || `All ${filterName}s`
        );
      });

      attachDatasetEvents(datasetKey);
      applyFilters(datasetKey);

      if (
        datasets.High_Frequency.loaded &&
        datasets.Low_Frequency.loaded &&
        datasets.undigitised.loaded
      ) {
        rebuildMapLayers();
      }
    } catch (error) {
      if (meta) {
        meta.textContent = `There was a problem loading ${dataset.file}. Make sure the spreadsheet is in the same folder as this HTML file.`;
      }
      console.error(error);
    }
  }

  function attachDatasetEvents(datasetKey) {
    const dataset = datasets[datasetKey];
    if (dataset.eventsBound) return;

    Object.values(dataset.filters).forEach(id => {
      const element = document.getElementById(id);
      if (!element) return;

      const eventName = element.tagName === "SELECT" ? "change" : "input";
      element.addEventListener(eventName, () => {
        dataset.page = 1;
        applyFilters(datasetKey);
      });
    });

    dataset.eventsBound = true;
  }

  function applyFilters(datasetKey) {
    const dataset = datasets[datasetKey];

    const searchTerm = dataset.filters.search
      ? normalizeForSearch(document.getElementById(dataset.filters.search).value)
      : "";

    const startYear = dataset.filters.start
      ? parseFloat(document.getElementById(dataset.filters.start).value)
      : NaN;

    const finishYear = dataset.filters.finish
      ? parseFloat(document.getElementById(dataset.filters.finish).value)
      : NaN;

    let filtered = dataset.rows.filter(row => {
      const searchMatch = !searchTerm || Object.values(row).some(value =>
        normalizeForSearch(value).includes(searchTerm)
      );
      if (!searchMatch) return false;

      for (const [filterName, columnName] of Object.entries(dataset.selectColumns || {})) {
        const filterId = dataset.filters[filterName];
        if (!filterId) continue;

        const filterElement = document.getElementById(filterId);
        const selected = filterElement ? filterElement.value : "";
        if (selected && normalizeValue(row[columnName]) !== selected) return false;
      }

      if (dataset.yearColumns && dataset.yearColumns.start && dataset.yearColumns.finish) {
        const rowStart = parseFloat(normalizeValue(row[dataset.yearColumns.start]));
        const rowFinish = parseFloat(normalizeValue(row[dataset.yearColumns.finish]));

        if (!Number.isNaN(startYear) && (Number.isNaN(rowStart) || rowStart < startYear)) return false;
        if (!Number.isNaN(finishYear) && (Number.isNaN(rowFinish) || rowFinish > finishYear)) return false;
      }

      return true;
    });

    filtered = sortRows(filtered, dataset.sort.column, dataset.sort.direction);
    dataset.filteredRows = filtered;
    renderTable(datasetKey);
  }

  function sortRows(rows, column, direction) {
    if (!column) return [...rows];

    return [...rows].sort((a, b) => {
      const aValue = normalizeValue(a[column]);
      const bValue = normalizeValue(b[column]);

      const aNum = parseFloat(String(aValue).replace(/,/g, "").replace(/[^\d.\-]/g, ""));
      const bNum = parseFloat(String(bValue).replace(/,/g, "").replace(/[^\d.\-]/g, ""));

      let comparison = 0;

      if (!Number.isNaN(aNum) && !Number.isNaN(bNum)) {
        comparison = aNum - bNum;
      } else {
        comparison = aValue.localeCompare(bValue, undefined, {
          numeric: true,
          sensitivity: "base"
        });
      }

      return direction === "asc" ? comparison : -comparison;
    });
  }

  function renderTable(datasetKey) {
    const dataset = datasets[datasetKey];
    const table = document.getElementById(dataset.tableId);
    const meta = document.getElementById(dataset.metaId);
    const empty = document.getElementById(dataset.emptyId);
    const pageInfo = document.getElementById(dataset.pageInfoId);

    if (!table || !meta || !empty || !pageInfo) return;

    let visibleHeaders = dataset.headers;

    if (datasetKey === "tools") {
      visibleHeaders = visibleHeaders.filter(header => {
        const cleaned = String(header).trim().toLowerCase();
        return cleaned.includes("tool") || cleaned.includes("price") || cleaned.includes("cost") || cleaned === "link";
      });
    }

    const totalRows = dataset.filteredRows.length;
    const totalPages = Math.max(1, Math.ceil(totalRows / PAGE_SIZE));
    dataset.page = Math.min(dataset.page, totalPages);

    const startIndex = (dataset.page - 1) * PAGE_SIZE;
    const rowsForPage = dataset.filteredRows.slice(startIndex, startIndex + PAGE_SIZE);

    const thead = document.createElement("thead");
    const headerRow = document.createElement("tr");

    visibleHeaders.forEach(header => {
      const th = document.createElement("th");
      th.title = header;
      th.innerHTML = `${header}<span class="sort-indicator">${
        dataset.sort.column === header
          ? (dataset.sort.direction === "asc" ? "▲" : "▼")
          : "↕"
      }</span>`;
      th.addEventListener("click", () => toggleSort(datasetKey, header));
      headerRow.appendChild(th);
    });

    thead.appendChild(headerRow);

    const tbody = document.createElement("tbody");

    rowsForPage.forEach(row => {
      const tr = document.createElement("tr");

      visibleHeaders.forEach(header => {
        const td = document.createElement("td");
        const value = row[header];
        let text = normalizeValue(value);
        const cleanedHeader = String(header).trim().toLowerCase();
        const isPlainNumber = /^-?\d+(\.\d+)?$/.test(text.trim());

        const shouldRoundTwoDecimals =
          cleanedHeader === "latitude" ||
          cleanedHeader === "longitude" ||
          (cleanedHeader.includes("recorded") && cleanedHeader.includes("year")) ||
          (cleanedHeader.includes("missing") && cleanedHeader.includes("year"));

        if (shouldRoundTwoDecimals && isPlainNumber) text = Number(text).toFixed(2);

        const isPriceColumn = datasetKey === "tools" &&
          (cleanedHeader.includes("price") || cleanedHeader.includes("cost"));

        if (isPriceColumn && isPlainNumber) text = Number(text).toFixed(2);

        td.title = text;

        let linkUrl = null;
        if (value && typeof value === "object" && value.url) linkUrl = value.url;
        else if (/^https?:\/\//i.test(text)) linkUrl = text;

        const isLinkColumn = cleanedHeader === "link";

        if (isLinkColumn && linkUrl) {
          const a = document.createElement("a");
          a.href = linkUrl;
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          a.className = "cell-link";
          a.textContent = text || linkUrl;
          a.title = linkUrl;
          td.appendChild(a);
        } else {
          const span = document.createElement("span");
          span.className = "cell-clip";
          span.textContent = text;
          span.title = text;
          td.appendChild(span);
        }

        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });

    table.innerHTML = "";
    table.appendChild(thead);
    table.appendChild(tbody);

    empty.classList.toggle("active", totalRows === 0);

    meta.textContent = totalRows === 0
      ? "0 matching rows."
      : `Showing ${startIndex + 1}-${Math.min(startIndex + PAGE_SIZE, totalRows)} of ${totalRows} matching rows.`;

    pageInfo.textContent = `Page ${dataset.page} of ${totalPages}`;

    const buttons = document.querySelectorAll(`#${dataset.containerId} .pager button`);
    if (buttons.length >= 2) {
      buttons[0].disabled = dataset.page <= 1;
      buttons[1].disabled = dataset.page >= totalPages;
    }
  }

  function toggleSort(datasetKey, column) {
    const dataset = datasets[datasetKey];

    if (dataset.sort.column === column) {
      dataset.sort.direction = dataset.sort.direction === "asc" ? "desc" : "asc";
    } else {
      dataset.sort.column = column;
      dataset.sort.direction = "asc";
    }

    applyFilters(datasetKey);
  }

  function changePage(datasetKey, delta) {
    const dataset = datasets[datasetKey];
    dataset.page += delta;
    renderTable(datasetKey);
  }

  function resetFilters(datasetKey) {
    const dataset = datasets[datasetKey];

    Object.values(dataset.filters).forEach(id => {
      const element = document.getElementById(id);
      if (!element) return;
      element.value = "";
    });

    dataset.sort = { column: null, direction: "asc" };
    dataset.page = 1;
    applyFilters(datasetKey);
  }

  function toggleDataset(datasetKey) {
    const container = document.getElementById(datasets[datasetKey].containerId);
    if (container) container.classList.toggle("active");
  }

  window.addEventListener("DOMContentLoaded", () => {
    initialiseMap();
    loadDataset("High_Frequency");
    loadDataset("Low_Frequency");
    loadDataset("undigitised");
    loadDataset("tools");
  });
</script>
